name: Publish Docker images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "selfieproxy-reverseproxy/**"
      - "selfieproxy-portal/**"
      - "selfieproxy-identity-provider/**"
      - "selfieproxy-localsites-webserver/**"
      - "selfieproxy-check-prerequisites/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: selfieproxy-reverseproxy
            context: ./selfieproxy-reverseproxy
          - image: selfieproxy-portal
            context: ./selfieproxy-portal
          - image: selfieproxy-identity-provider
            context: ./selfieproxy-identity-provider
          - image: selfieproxy-local-websites
            context: ./selfieproxy-localsites-webserver
          - image: selfieproxy-check-prerequisites
            context: ./selfieproxy-check-prerequisites
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
