server.port=${SERVER_PORT:8083}
# boringproxy terminates TLS in front of us and forwards plain HTTP, setting
# X-Forwarded-Proto/-Host correctly (see boringproxy's http_proxy.go) -- same
# fix selfieproxy-portal already applies. Without this, Tomcat computes its
# own scheme as "http" (the actual scheme of the boringproxy->here hop), which
# mismatches the browser's "https://console.<domain>" Origin header on a
# WebSocket handshake and gets rejected with a 403 by Spring's default
# same-origin check -- this is what actually silently blocked every browser
# WebSocket attempt until this was traced down.
server.forward-headers-strategy=native
spring.application.name=selfieproxy-remote-console

# Spring Boot's static resource handler otherwise lets the browser cache
# connect.js/connect.css indefinitely on its own heuristics (no explicit
# Cache-Control at all) -- normal browser caching (faster, the default)
# unless DEBUG_MODE=true, in which case every load force-revalidates
# (If-None-Match/If-Modified-Since) so a rebuilt+redeployed container never
# keeps serving a stale cached connect.js to an already-open tab during
# active iteration. Same idiom as selfieproxy-portal's own
# application.properties -- DEBUG_MODE reaches this container via
# docker-compose.yaml's explicit environment: mapping (this service has no
# env_file: .env of its own, unlike selfieproxy-portal/-identity-provider).
spring.web.resources.cache.cachecontrol.no-cache=${DEBUG_MODE:false}

# selfieproxy-guacd -- both services run network_mode: host (see root
# CLAUDE.md), so this is always a plain 127.0.0.1 dial.
guacd.host=${GUACD_HOST:127.0.0.1}
guacd.port=${GUACD_PORT:4822}

# Read-only view of selfieproxy-portal's own store (ExposedAppStore, filtered
# to SSH/RDP/VNC-mode Network Services by this module's own RemoteConsoleStore)
# and self-provisioned encryption key -- shared /data volume, this service
# never writes either file. Paths must match selfieproxy-portal's
# selfieproxy.exposed-apps-path/selfieproxy.network-service-key-path.
selfieproxy.exposed-apps-path=${EXPOSED_APPS_PATH:/data/exposed-apps.json}
selfieproxy.network-service-key-path=${NETWORK_SERVICE_KEY_PATH:/data/network-service-secret-key}

# The SSH console's font size/font family/color theme (TerminalSettingsStore, served to
# settings.js via TerminalSettingsController) -- previously browser-only localStorage, now
# persisted here so it survives across browsers/devices and so selfieproxy-portal's own
# mirrored TerminalSettingsStore can include/restore it in a configuration export/import.
selfieproxy.terminal-settings-path=${TERMINAL_SETTINGS_PATH:/data/remote-console-settings.json}
