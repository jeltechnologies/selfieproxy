<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${console.name()} + ' - Selfie Proxy Console'">Selfie Proxy Console</title>
	<link rel="stylesheet" th:href="@{/css/connect.css}">

	<link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
	<link rel="icon" th:href="@{/favicon.ico}" sizes="any">
	<link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon/favicon-16x16.png}">
	<link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon/favicon-32x32.png}">
	<link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/favicon/apple-touch-icon.png}">
	<!-- crossorigin="use-credentials" -- without it, browsers fetch the manifest without
	     cookies even same-origin, so it never carries the SSO session cookie; since every
	     request to this always-SSO-gated domain gets redirected into the OIDC flow without
	     a valid session, the credential-less fetch bounces into a cross-origin redirect with
	     no CORS headers, which the browser then blocks and logs as a CORS error. -->
	<link rel="manifest" th:href="@{/site.webmanifest}" crossorigin="use-credentials">
	<meta name="theme-color" content="#ffffff">
</head>
<body>
	<header class="toolbar">
		<span class="console-name" th:text="${console.name()} + ' (' + ${console.mode()} + ')'"></span>
		<span id="status" class="status">Connecting...</span>
		<button type="button" id="fullscreen-button">Fullscreen</button>
		<button type="button" id="disconnect-button">Disconnect</button>
	</header>
	<main id="display-container"></main>

	<script th:inline="javascript">
		// Built as two separate statements deliberately -- Thymeleaf's JS inlining
		// silently drops any text concatenated onto the same statement as an inlined
		// placeholder (eg. a trailing + "/ws" is swallowed), so the id is inlined
		// alone here and the URL is composed afterwards from a plain JS variable
		// instead. (Line comments here, not a block comment: an earlier version of
		// this comment used /* */ and quoted the inlining syntax inside it, which
		// closed the comment early and broke the whole script.)
		window.selfieProxyConsole = {
			fqdn: /*[[${fqdn}]]*/ "",
			mode: /*[[${console.mode().name()}]]*/ ""
		};
		window.selfieProxyConsole.wsUrl = (window.location.protocol === "https:" ? "wss://" : "ws://")
			+ window.location.host + "/connect/" + window.selfieProxyConsole.fqdn + "/ws";
	</script>
	<script th:src="@{/js/vendor/guacamole-common-js/guacamole-common.min.js}"></script>
	<script th:src="@{/js/connect.js}"></script>
</body>
</html>
