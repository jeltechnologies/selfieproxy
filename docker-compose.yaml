services:
  dns-check:
    image: alpine:3.20
    env_file: .env
    volumes:
      - ./check-dns.sh:/check-dns.sh:ro
    entrypoint: ["/bin/sh", "-c", "apk add --no-cache curl bind-tools >/dev/null && /check-dns.sh"]

  selfieproxy-reverseproxy:
    image: ghcr.io/jeltechnologies/selfieproxy-reverseproxy:latest
    build: ./selfieproxy-reverseproxy
    container_name: selfieproxy-reverseproxy
    restart: unless-stopped
    depends_on:
      dns-check:
        condition: service_completed_successfully
    network_mode: host
    volumes:
      - ./data/boringproxy/storage:/storage/
      - ./data/boringproxy/runtime:/runtime
      - /root/.ssh:/root/.ssh
      - /etc/ssl/certs/:/etc/ssl/certs/:ro
    command: ["server", "-admin-domain", "${REVERSE_PROXY_LISTENER:-proxylistener}.${DOMAIN}", "-portal-domain", "${SELFPROXY_ADMIN_DOMAIN:-selfieproxy}.${DOMAIN}", "-portal-port", "8081", "-sso-domain", "${SELFPROXY_AUTH_DOMAIN:-auth}.${DOMAIN}", "-sso-port", "8082", "-oidc-issuer", "${OIDC_ISSUER_URL:-https://${SELFPROXY_AUTH_DOMAIN:-auth}.${DOMAIN}}", "-oidc-client-id", "${OIDC_CLIENT_ID:-selfieproxy}", "-oidc-client-secret", "${OIDC_CLIENT_SECRET:-}", "-accept-ca-terms", "-cert-dir", "/storage/certmagic", "-runtime-dir", "/runtime", "-debug=${BORINGPROXY_DEBUG:-false}"]
    environment:
      USER: "root"
      HOME: "/root"
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null https://${REVERSE_PROXY_LISTENER:-proxylistener}.${DOMAIN}/ 2>&1 | grep -qE 'saved|HTTP/1.1'"]
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 10s
      start_interval: 1s

  selfieproxy-portal:
    image: ghcr.io/jeltechnologies/selfieproxy-portal:latest
    build: ./selfieproxy-portal
    container_name: selfieproxy-portal
    restart: unless-stopped
    depends_on:
      selfieproxy-reverseproxy:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./data/boringproxy/runtime:/runtime:ro
      - ./data/selfieproxy:/data
      - ./data/selfieproxy/sites-conf:/sites-conf
      - ./data/selfieproxy/sites:/sites
    ports:
      - "127.0.0.1:8081:8080"

  selfieproxy-identity-provider:
    image: ghcr.io/jeltechnologies/selfieproxy-identity-provider:latest
    build: ./selfieproxy-identity-provider
    container_name: selfieproxy-identity-provider
    restart: unless-stopped
    depends_on:
      dns-check:
        condition: service_completed_successfully
    env_file: .env
    environment:
      SSO_ISSUER_URL: "https://${SELFPROXY_AUTH_DOMAIN:-auth}.${DOMAIN}"
      SSO_CLIENT_REDIRECT_URI: "https://${REVERSE_PROXY_LISTENER:-proxylistener}.${DOMAIN}/oidc/callback"
      SSO_SIGNING_KEY_PATH: "/data/sso-signing-key.pem"
    volumes:
      - ./data/selfieproxy:/data
    ports:
      - "127.0.0.1:8082:8080"

  selfieproxy-local-websites:
    image: ghcr.io/jeltechnologies/selfieproxy-local-websites:latest
    build: ./sites-webserver
    container_name: selfieproxy-local-websites
    restart: unless-stopped
    volumes:
      - ./data/selfieproxy/sites-conf:/etc/nginx/conf.d
      - ./data/selfieproxy/sites:/sites:ro
    ports:
      - "127.0.0.1:8090:80"

  selfieproxy-local-agent:
    image: ghcr.io/jeltechnologies/selfieproxy-reverseproxy:latest
    build: ./selfieproxy-reverseproxy
    container_name: selfieproxy-local-agent
    restart: unless-stopped
    depends_on:
      - selfieproxy-portal
    network_mode: host
    env_file: .env
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until [ -s /selfieproxy-data/selfieproxy-local-agent-secret ]; do sleep 1; done;
        exec /selfieproxy-reverseproxy agent
        -server ${REVERSE_PROXY_LISTENER:-proxylistener}.${DOMAIN}
        -secret "$$(cat /selfieproxy-data/selfieproxy-local-agent-secret)"
        -agent-name selfieproxy-internal-agent
        -user admin
        -poll-interval-ms 300000
        -cert-dir /certmagic
    volumes:
      - ./data/selfieproxy:/selfieproxy-data:ro
      - ./data/boringproxy/this-server-certmagic:/certmagic
      - /etc/ssl/certs/:/etc/ssl/certs/:ro
