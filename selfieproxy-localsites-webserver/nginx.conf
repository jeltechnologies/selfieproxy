worker_processes auto;

events {
	worker_connections 1024;
}

http {
	include mime.types;
	default_type application/octet-stream;
	sendfile on;

	# Generated by entrypoint.sh from DEBUG_MODE at container start -- "access_log
	# off;" by default, "access_log /dev/stdout;" only when DEBUG_MODE=true, so a
	# static site's traffic doesn't spam the container's logs unless asked for.
	include /etc/nginx/access_log.conf;

	# Catch-all: boringproxy only ever forwards a request here for a domain
	# that has a Tunnel pointed at this container, but a stale/removed
	# conf.d file (or a request that reaches this port some other way)
	# should get a clear response instead of falling through to whichever
	# server block happens to be first.
	server {
		listen 80 default_server;
		server_name _;
		return 404 "No site configured for this domain.\n";
	}

	include /etc/nginx/conf.d/*.conf;
}
