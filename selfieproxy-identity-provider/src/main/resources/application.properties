server.port=8080
spring.thymeleaf.cache=false
spring.application.name=selfieproxy-identity-provider

# Selfie Proxy's single hardcoded admin user. Ownership of these two vars
# moved here from selfieproxy-portal -- see selfieproxy-identity-provider's
# CLAUDE.md context (Embedded OIDC SSO plan) for why.
admin-portal.username=${ADMIN_PORTAL_USERNAME:admin}

# One-time seed only -- consumed by AdminUserStore to bcrypt-hash and
# persist the admin record on first boot, then ignored forever after. The
# password actually in effect lives in the hashed record at
# admin-portal.user-store-path, not here.
admin-portal.bootstrap-password=${ADMIN_PORTAL_BOOTSTRAP_PASSWORD:}

# Where AdminUserStore persists the (bcrypt-hashed) admin password and its
# mustChangePassword flag -- self-provisioned on first boot from
# admin-portal.bootstrap-password above, mirroring sso.signing-key-path
# below.
admin-portal.user-store-path=${ADMIN_USER_STORE_PATH:/data/admin-user.json}

# Path to the RSA signing keypair this server self-provisions on first boot
# and reloads on every subsequent restart -- see SigningKeyProvider.
sso.signing-key-path=${SSO_SIGNING_KEY_PATH:/data/sso-signing-key.pem}

# This server's own external base URL, used as the OIDC discovery `issuer`,
# the `iss` claim on every ID token, and prefixed onto every endpoint URL
# advertised in the discovery document. Always supplied in production
# (https://<SELFPROXY_AUTH_DOMAIN>.<DOMAIN>); blank here only for local runs.
sso.issuer-url=${SSO_ISSUER_URL:}

# The single hardcoded public OAuth2 client's redirect URI (the boringproxy
# admin domain's /oidc/callback URL) -- any /authorize request whose
# redirect_uri doesn't exactly match this is rejected. No dynamic client
# registration.
sso.client-redirect-uri=${SSO_CLIENT_REDIRECT_URI:}

# Same OIDC_ISSUER_URL boringproxy reads for its -oidc-issuer flag -- not to
# be confused with sso.issuer-url above (this server's *own* issuer identity).
# Blank by default (this bundled server is the real IdP); non-blank when an
# operator has swapped in an external IdP instead, in which case
# AdminUserStore skips bootstrapping the admin password record, since this
# server's own credentials would never be used to log in -- see OidcProperties.
oidc.issuer-url=${OIDC_ISSUER_URL:}
