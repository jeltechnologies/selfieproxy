<!DOCTYPE html>
<html th:attr="data-theme=${theme}" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Selfieproxy</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">

	<link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
	<link rel="icon" th:href="@{/favicon.ico}" sizes="any">
	<link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon/favicon-16x16.png}">
	<link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon/favicon-32x32.png}">
	<link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/favicon/apple-touch-icon.png}">
	<link rel="manifest" th:href="@{/site.webmanifest}">
	<meta name="theme-color" content="#ffffff">
</head>
<body class="login-body">
	<main class="login-card">
		<h1>
			<svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor" aria-hidden="true">
				<path d="M8 6.982C9.664 5.309 13.825 8.236 8 12 2.175 8.236 6.336 5.309 8 6.982"/>
				<path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.707L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.646a.5.5 0 0 0 .708-.707L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
			</svg>
			Selfie Proxy
		</h1>
		<p class="slogan muted">Choose a new password to finish signing in</p>

		<p class="warning-strong">Warning: Remember this username and password — there is no recovery option. Losing it means reinstalling the server and losing all your data.</p>

		<p class="error" th:each="msg : ${errors}" th:text="${msg}"></p>

		<form method="post" th:action="@{/change-password}">
			<input type="hidden" name="authz_id" th:value="${authzId}">
			<label for="username">Username</label>
			<input type="text" id="username" name="username" th:value="${username}" required autofocus>

			<label for="newPassword">New password</label>
			<div class="secret-input-wrap">
				<input type="password" id="newPassword" name="newPassword" required minlength="12">
				<button type="button" class="icon-button password-toggle" data-for="newPassword" title="Show password" aria-label="Show password">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
				</button>
			</div>

			<label for="confirmNewPassword">Confirm new password</label>
			<div class="secret-input-wrap">
				<input type="password" id="confirmNewPassword" name="confirmNewPassword" required minlength="12">
				<button type="button" class="icon-button password-toggle" data-for="confirmNewPassword" title="Show password" aria-label="Show password">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
				</button>
			</div>

			<button type="submit">Set password</button>
		</form>
	</main>
	<footer class="login-footer muted">Powered by selfieproxy by Jelte Jansons — built on boringproxy by Anders Pitman — MIT Licensed</footer>
	<script th:src="@{/js/account.js}"></script>
</body>
</html>
