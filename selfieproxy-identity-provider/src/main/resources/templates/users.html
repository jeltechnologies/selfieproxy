<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Users - Selfie Proxy</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">

	<link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
	<link rel="icon" th:href="@{/favicon.ico}" sizes="any">
	<link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon/favicon-16x16.png}">
	<link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon/favicon-32x32.png}">
	<link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/favicon/apple-touch-icon.png}">
	<link rel="manifest" th:href="@{/site.webmanifest}">
	<meta name="theme-color" content="#ffffff">
</head>
<body>
	<main class="page">
		<section class="page-header">
			<div>
				<h1>
					<svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
						<path d="M8 6.982C9.664 5.309 13.825 8.236 8 12 2.175 8.236 6.336 5.309 8 6.982"/>
						<path d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.707L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.646a.5.5 0 0 0 .708-.707L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"/>
					</svg>
					Users
				</h1>
				<p class="muted">Users can log in to every application with single sign on. Only the admin user can make changes to Selfie Proxy through this portal.</p>
			</div>
			<a class="button" th:href="@{/users/new(return_to=${returnTo})}">Add</a>
		</section>

		<table class="apps-table">
			<thead>
				<tr>
					<th>Username</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td th:text="${adminUsername} + ' (admin)'"></td>
					<td>
						<a class="button-small" th:href="@{/users/{username}/edit(username=${adminUsername}, return_to=${returnTo})}">Edit</a>
					</td>
				</tr>
				<tr th:each="u : ${users}">
					<td th:text="${u.username()}"></td>
					<td>
						<a class="button-small" th:href="@{/users/{username}/edit(username=${u.username()}, return_to=${returnTo})}">Edit</a>
					</td>
				</tr>
			</tbody>
		</table>

		<div class="button-panel" th:if="${returnTo != null}">
			<a th:href="${returnTo}" class="button-small">Back to Selfie Proxy</a>
		</div>
	</main>

	<footer class="login-footer muted">Powered by selfieproxy by Jelte Jansons — built on boringproxy by Anders Pitman — MIT Licensed</footer>
</body>
</html>
