<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Selfie Proxy SSO</title>
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background: #0f172a;
			color: #e2e8f0;
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
		}
		.login-card {
			background: #1e293b;
			padding: 2.5rem;
			border-radius: 12px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
			width: 320px;
		}
		h1 {
			margin: 0 0 1.5rem;
			font-size: 1.4rem;
			text-align: center;
		}
		label {
			display: block;
			margin: 1rem 0 0.25rem;
			font-size: 0.85rem;
			color: #94a3b8;
		}
		input {
			width: 100%;
			box-sizing: border-box;
			padding: 0.6rem;
			border-radius: 6px;
			border: 1px solid #334155;
			background: #0f172a;
			color: #e2e8f0;
		}
		button {
			width: 100%;
			margin-top: 1.5rem;
			padding: 0.7rem;
			border: none;
			border-radius: 6px;
			background: #3b82f6;
			color: white;
			font-weight: 600;
			cursor: pointer;
		}
		button:hover {
			background: #2563eb;
		}
		.error {
			color: #f87171;
			font-size: 0.85rem;
			margin-top: 1rem;
			text-align: center;
		}
	</style>
</head>
<body>
	<main class="login-card">
		<h1>Selfie Proxy</h1>
		<p class="error" th:if="${error != null}" th:text="${error}"></p>
		<form method="post" th:action="@{/login}">
			<input type="hidden" name="authz_id" th:value="${authzId}">
			<label for="username">Username</label>
			<input type="text" id="username" name="username" required autofocus>
			<label for="password">Password</label>
			<input type="password" id="password" name="password" required>
			<button type="submit">Log in</button>
		</form>
	</main>
</body>
</html>
