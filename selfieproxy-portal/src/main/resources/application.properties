server.port=8080
# boringproxy always terminates TLS in front of us and forwards plain HTTP,
# setting X-Forwarded-Proto/-Host correctly (see boringproxy's http_proxy.go)
# -- without this, redirects (eg. after /login) are built with the scheme we
# actually see (http), forcing an extra http->https hop through boringproxy.
server.forward-headers-strategy=native
# Cookies always work here; without this, Tomcat's URL-rewriting fallback
# appends ;jsessionid=... to the post-login redirect, and that path doesn't
# match any @GetMapping, producing a 404 that only affects a client's very
# first request after login (before a session cookie exists to confirm).
server.servlet.session.tracking-modes=cookie
spring.application.name=selfieproxy-portal
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=non_null
# Local Website ZIP uploads (LocalWebsiteController) can be sizable (images,
# etc.) -- raise Spring's conservative multipart defaults (1MB file / 10MB
# request) well above any realistic static site.
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
# Spring Boot's static resource handler otherwise lets the browser cache
# static/js/*.js and static/css/*.css indefinitely on its own heuristics (no
# explicit Cache-Control at all) -- normally fine (and faster) once a page is
# stable, but during active iteration a rebuilt+redeployed container can keep
# serving stale JS/CSS to an already-open tab (same problem
# selfieproxy-remote-console's connect.js already hit -- see its own
# application.properties, unconditionally on since that module has no
# DEBUG_MODE-gated default). Gated on DEBUG_MODE here rather than always on,
# since this portal's static assets change far less often than that module's:
# off by default for the normal fast experience, only forcing a conditional
# revalidation (If-None-Match/If-Modified-Since) on every load when actively
# developing against it.
spring.web.resources.cache.cachecontrol.no-cache=${DEBUG_MODE:false}

# Populated from the boringproxy repo's own top-level .env (PRIMARY_DOMAIN required;
# REVERSE_PROXY_LISTENER_SUBDOMAIN/SELFPROXY_ADMIN_DOMAIN optional, defaulting to
# "proxylistener"/"selfieproxy" -- poweruser overrides only, must match
# docker-compose.yaml's/check-dns.sh's own fallbacks for the same
# vars), either exported into the shell before a local run, or injected by
# docker-compose.yaml's env_file in the Docker deployment.
boringproxy.primary-domain=${PRIMARY_DOMAIN:example.com}
boringproxy.admin-subdomain=${REVERSE_PROXY_LISTENER_SUBDOMAIN:proxylistener}
boringproxy.portal-subdomain=${SELFPROXY_ADMIN_DOMAIN:selfieproxy}
boringproxy.auth-subdomain=${SELFPROXY_AUTH_DOMAIN:auth}
boringproxy.console-subdomain=${SELFPROXY_CONSOLE_DOMAIN:console}

# Same OIDC_ISSUER_URL boringproxy itself reads for its -oidc-issuer flag --
# blank by default (bundled selfieproxy-identity-provider), non-blank when an
# operator has swapped in an external IdP (Keycloak, Authentik, etc.). Lets
# GlobalModelAttributes know whether linking into the bundled IdP's own
# self-service /account page would actually be meaningful.
oidc.issuer-url=${OIDC_ISSUER_URL:}

# Path to the ephemeral, in-memory-only REST token boringproxy writes at
# every startup (never persisted to its own database) -- used solely for
# selfieproxy-portal's own machine-to-machine calls to boringproxy's REST API.
boringproxy.internal-token-path=${INTERNAL_TOKEN_PATH:/runtime/internal_rest_token}

# selfieproxy-identity-provider's internal-only Users API (InternalUsersController)
# -- reachable only over the Docker bridge network, on a second Tomcat
# connector identity-provider never publishes to the host and never wires
# into selfieproxy-reverseproxy's -sso-port, so it has no route in from the
# public internet. Authenticated with an ephemeral token identity-provider
# writes at every startup (mirrors boringproxy.internal-token-path above, in
# the opposite direction: identity-provider is the token publisher here, the
# portal is the reader) -- see IdentityProviderClient/IdentityProviderTokenProvider.
identity-provider.internal-base-url=${IDENTITY_PROVIDER_INTERNAL_BASE_URL:http://selfieproxy-identity-provider:8095}
identity-provider.internal-token-path=${IDENTITY_PROVIDER_INTERNAL_TOKEN_PATH:/data/identity-internal-token}

# Selfie Proxy's own record of exposed-app data that BoringProxy's Tunnel
# schema can't reliably represent (eg. homelab protocol) -- see
# ExposedAppStore. Not BoringProxy's database; ours alone.
selfieproxy.exposed-apps-path=${EXPOSED_APPS_PATH:/data/exposed-apps.json}

# Selfie Proxy's own record of every Local Website (see LocalWebsiteStore) --
# a feature independent of Homelabs/Exposed Apps entirely, so it gets its own
# file rather than living in exposed-apps-path.
selfieproxy.local-websites-path=${LOCAL_WEBSITES_PATH:/data/local-websites.json}

# Selfie Proxy's own record of registered secondary domains (see DomainStore)
# -- the primary domain itself is never stored here, it's always sourced from
# boringproxy.primary-domain above and can never be renamed/removed.
selfieproxy.domains-path=${DOMAINS_PATH:/data/domains.json}

# Symmetric key Selfie Proxy self-provisions on first use to encrypt an
# SSH/RDP/VNC-mode Network Service's stored credential at rest, within
# exposed-apps-path above (NetworkServiceCredentialCipher) -- same
# self-provisioning idiom as selfieproxy-identity-provider's
# sso-signing-key.pem. Host-specific, so (like the admin account and that
# signing key) never included in a configuration export/import -- see
# BackupService, which strips encryptedSecret from every exported app.
# Also read (never written) by the separate selfieproxy-remote-console
# service over the shared /data volume, same loose coupling as Local
# Websites' shared sites-conf/sites dirs.
selfieproxy.network-service-key-path=${NETWORK_SERVICE_KEY_PATH:/data/network-service-secret-key}

# Selfie Proxy's single shared UI theme setting (Light/Dark, see
# ThemeStore/AppearanceController) -- written only here; selfieproxy-identity-provider
# reads this exact same file/property (same default path) over the shared
# /data volume to apply the same setting to its own login/change-password/
# logged-out pages, the same read-only-mirror shape as selfieproxy-remote-console's
# RemoteConsoleStore reading selfieproxy.exposed-apps-path. Also included in every
# configuration export and applied on restore -- see BackupService.
selfieproxy.theme-path=${THEME_SETTINGS_PATH:/data/theme.json}

# Read/write mirror of selfieproxy-remote-console's own SSH console font/family/color-theme
# settings (TerminalSettingsStore there) -- this module only touches it for configuration
# export/import (BackupService): reads it to include in an export, writes it (as a second
# writer of a file it doesn't otherwise own) to apply it on restore. Same property name/
# default path as remote-console's own, over the same shared /data volume.
selfieproxy.terminal-settings-path=${TERMINAL_SETTINGS_PATH:/data/remote-console-settings.json}

# Name of the agent selfieproxy-portal creates automatically on first boot if it
# doesn't already exist -- see AgentBootstrap. bootstrap-marker-path records that
# this one-time bootstrap already ran, so deleting the default homelab later does
# not recreate it on the next restart.
agent.default-name=${DEFAULT_HOMELAB:my-homelab}
agent.bootstrap-marker-path=${DEFAULT_HOMELAB_MARKER_PATH:/data/default-homelab-bootstrapped}

# Name of the colocated "This Server" homelab -- an ordinary Agent whose
# process runs alongside the server itself (docker-compose.yaml's
# selfieproxy-localsites-agent service) instead of a remote network. Bootstrapped the
# same way as agent.default-name; secretPath is where its current secret is
# republished on every startup so the colocated agent needs no manual
# copy-paste -- see ThisServerBootstrap. agent-name is hardcoded, not
# env-overridable, since docker-compose.yaml's selfieproxy-localsites-agent
# service hardcodes the same name for -agent-name and the two must match.
this-server.agent-name=selfieproxy-internal-agent
this-server.secret-path=${THIS_SERVER_SECRET_PATH:/data/selfieproxy-localsites-agent-secret}

# Address and shared filesystem paths of the selfieproxy-local-websites container
# (docker-compose.yaml) that serves every Local Website -- see
# LocalWebsiteController/StaticSiteProvisioner.
sites-webserver.host=${SITES_WEBSERVER_HOST:127.0.0.1}
sites-webserver.port=${SITES_WEBSERVER_PORT:8090}
sites-webserver.conf-path=${SITES_WEBSERVER_CONF_PATH:/sites-conf}
sites-webserver.sites-path=${SITES_WEBSERVER_SITES_PATH:/sites}

# Where an uploaded backup ZIP is extracted for inspection before the user
# picks what to restore -- see BackupService. Lives under the same /data
# mount as everything else in this file, no separate volume needed.
backup.restore-staging-path=${RESTORE_STAGING_PATH:/data/restore-staging}
