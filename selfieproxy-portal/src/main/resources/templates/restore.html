<!DOCTYPE html>
<html th:attr="data-theme=${theme}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Selfie Proxy - Import configuration')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='import')}"></header>

	<main class="page">
		<section class="page-header">
			<div>
				<h1>Import configuration</h1>
				<p class="page-subtitle">Upload an exported configuration ZIP. In the next steps you choose what to import from this ZIP file.</p>
			</div>
		</section>

		<ul class="errors" th:if="${errors != null and not #lists.isEmpty(errors)}">
			<li th:each="e : ${errors}" th:text="${e}"></li>
		</ul>

		<div class="warning" th:if="${result != null}">
			<p>
				Imported <strong th:text="${result.homelabsRestored()}"></strong> homelab(s),
				<strong th:text="${result.exposedAppsRestored()}"></strong> application(s), and
				<strong th:text="${result.localWebsitesRestored()}"></strong> local website(s).
			</p>
			<ul th:if="${result.hasFailures()}">
				<li th:each="f : ${result.failures()}" th:text="${f}"></li>
			</ul>
		</div>

		<form method="post" enctype="multipart/form-data" th:action="@{/import-configuration/stage}">
			<div class="field">
				<label for="backupZip">Configuration ZIP</label>
				<input type="file" id="backupZip" name="backupZip" accept=".zip,application/zip" required>
			</div>
			<div class="button-panel">
				<button type="button" class="button" disabled>Back</button>
				<button type="submit" class="button">Continue</button>
				<a class="button button-cancel" th:href="@{/}">Cancel</a>
			</div>
		</form>
	</main>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
