<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Selfie Proxy - Import configuration')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='import')}"></header>

	<main class="page">
		<section class="page-header">
			<div>
				<h1>Import configuration</h1>
				<p class="page-subtitle" th:text="'Step ' + ${stepNumber} + ' of ' + ${totalSteps} + ': Select which local websites to import'"></p>
			</div>
		</section>

		<form id="cancel-form" method="post" th:action="@{/import-configuration/{stagingId}/cancel(stagingId=${stagingId})}"></form>

		<form id="wizard-form" method="get" th:action="${nextUrl}">
			<input type="hidden" name="homelabs" th:each="h : ${selectedHomelabs}" th:value="${h}">
			<input type="hidden" name="exposedApps" th:each="a : ${selectedExposedApps}" th:value="${a}">

			<fieldset th:if="${#lists.isEmpty(manifest.localWebsites())}">
				<legend>Local websites</legend>
				<p class="muted">No local websites in this configuration export.</p>
			</fieldset>

			<fieldset th:unless="${#lists.isEmpty(manifest.localWebsites())}">
				<legend>Local websites</legend>
				<div class="button-panel select-controls">
					<button type="button" id="select-all-btn" class="button-small">Select All</button>
					<button type="button" id="select-none-btn" class="button-small">Select None</button>
				</div>
				<div th:each="site : ${manifest.localWebsites()}">
					<label class="restore-item">
						<input type="checkbox" name="localWebsites" th:value="${site.domain()}">
						<span th:text="${site.domain()}"></span>
						<span th:if="${existingLocalWebsites.contains(site.domain())}" class="status-badge status-badge-existing">Existing</span>
						<span th:unless="${existingLocalWebsites.contains(site.domain())}" class="status-badge status-badge-new">New</span>
					</label>
				</div>
			</fieldset>

			<div class="button-panel">
				<a class="button" th:if="${previousUrl != null}" th:href="${previousUrl}">Back</a>
				<button type="submit" form="cancel-form" class="button" th:if="${previousUrl == null}">Back</button>
				<button type="submit" class="button">Next</button>
				<button type="submit" form="cancel-form" class="button button-cancel">Cancel</button>
			</div>
		</form>
	</main>

	<script th:src="@{/js/restore-wizard.js}"></script>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
