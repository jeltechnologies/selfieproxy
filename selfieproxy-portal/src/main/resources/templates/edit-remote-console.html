<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${isNew} ? 'Add remote console - Selfie Proxy' : 'Edit remote console - Selfie Proxy')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='remote-consoles')}"></header>

	<main class="page">
		<h1 th:text="${isNew} ? 'Add remote console' : 'Edit ' + ${console.name()}"></h1>

		<ul class="errors" th:if="${errors != null and not #lists.isEmpty(errors)}">
			<li th:each="e : ${errors}" th:text="${e}"></li>
		</ul>

		<form id="remote-console-form" method="post"
			  th:action="${isNew} ? @{/remote-consoles} : @{/remote-consoles/{id}(id=${console.id()})}">

			<div class="field">
				<label for="name">Name</label>
				<input type="text" id="name" name="name" th:value="${console.name()}" required>
			</div>

			<div class="field">
				<label for="homelabName">Homelab</label>
				<select id="homelabName" name="homelabName" required>
					<option th:if="${!#lists.contains(homelabs, console.homelabName())}" value=""
							disabled="disabled" selected="selected">Select a homelab</option>
					<option th:each="n : ${homelabs}" th:value="${n}"
							th:text="${n} + (${homelabOnline.get(n)} ? ' (Connected)' : ' (Not connected)')"
							th:selected="${n == console.homelabName()}"></option>
				</select>
			</div>

			<div class="field-row">
				<div class="field">
					<label for="protocol">Protocol</label>
					<select id="protocol" name="protocol">
						<option value="SSH" th:selected="${console.protocol().name() == 'SSH'}">SSH</option>
						<option value="RDP" th:selected="${console.protocol().name() == 'RDP'}">RDP</option>
						<option value="VNC" th:selected="${console.protocol().name() == 'VNC'}">VNC</option>
					</select>
				</div>

				<div class="field">
					<label for="host">Host or IP address</label>
					<input type="text" id="host" name="host" th:value="${console.host()}" placeholder="127.0.0.1" required>
				</div>

				<div class="field">
					<label for="port">Port</label>
					<input type="number" id="port" name="port" th:value="${console.port()}" min="1" max="65535" required>
				</div>
			</div>

			<div class="field" id="username-field">
				<label for="username">Username</label>
				<input type="text" id="username" name="username" th:value="${console.username()}">
			</div>

			<div class="field" id="auth-mode-field">
				<label>
					<input type="radio" name="authMode" value="PASSWORD"
						   th:checked="${console.authMode().name() == 'PASSWORD'}">
					Password
				</label>
				<label>
					<input type="radio" name="authMode" value="PRIVATE_KEY"
						   th:checked="${console.authMode().name() == 'PRIVATE_KEY'}">
					Private key
				</label>
			</div>

			<div class="field">
				<label id="secret-label" for="secret">Password</label>
				<textarea id="secret" name="secret" rows="1" placeholder="Leave blank to keep the current credential"></textarea>
			</div>

			<div class="field" id="ignore-certificate-field">
				<label>
					<input type="checkbox" id="ignoreCertificate" name="ignoreCertificate" value="true"
						   th:checked="${console.ignoreCertificate()}">
					Accept a self-signed certificate on the target
				</label>
			</div>

			<div class="button-panel">
				<button type="submit" class="button">OK</button>
				<button type="button" id="remove-button" class="button button-danger" th:unless="${isNew}">Remove</button>
				<a class="button button-cancel" th:href="@{/remote-consoles}">Cancel</a>
			</div>
		</form>

		<form id="delete-form" method="post"
			  th:action="${isNew} ? '' : @{/remote-consoles/{id}/delete(id=${console.id()})}">
		</form>
	</main>

	<div id="confirm-overlay" class="overlay">
		<div class="overlay-card">
			<p>Remove this remote console? This cannot be undone.</p>
			<button type="button" id="confirm-remove" class="button button-danger">Remove</button>
			<button type="button" id="cancel-remove" class="button button-cancel">Cancel</button>
		</div>
	</div>

	<script th:src="@{/js/edit-remote-console.js}"></script>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
