<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Selfie Proxy - Remote consoles')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='remote-consoles')}"></header>

	<main class="page">
		<section class="page-header">
			<div>
				<h1>Remote consoles</h1>
				<p class="page-subtitle">Open a Homelab machine's SSH, RDP, or VNC session right in the browser, protected by your Selfieproxy login -- the underlying connection is never reachable from the internet directly.</p>
			</div>
			<a class="button" th:href="@{/remote-consoles/new}">Add</a>
		</section>

		<p class="muted" th:if="${#lists.isEmpty(consoles)}">
			No remote consoles yet.
		</p>

		<table class="apps-table" data-sortable th:if="${not #lists.isEmpty(consoles)}">
			<thead>
				<tr>
					<th data-sort-key="name">Name</th>
					<th data-sort-key="homelabName">Homelab</th>
					<th data-sort-key="protocol">Protocol</th>
					<th data-sort-key="host">Address</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="console : ${consoles}">
					<td th:attr="data-sort-value=${console.name()}" th:text="${console.name()}"></td>
					<td th:attr="data-sort-value=${console.homelabName()}"
						th:text="${console.homelabName()} + (${homelabOnline.get(console.homelabName())} ? ' (Connected)' : ' (Not connected)')"></td>
					<td th:attr="data-sort-value=${console.protocol()}" th:text="${console.protocol()}"></td>
					<td th:attr="data-sort-value=${console.host()}" th:text="${console.host()} + ':' + ${console.port()}"></td>
					<td>
						<a class="button-small" th:href="'https://' + ${consoleDomain} + '/connect/' + ${console.id()}"
						   target="_blank" rel="noopener"
						   onclick="window.open(this.href, '_blank', 'noopener'); return false;">Connect</a>
						<a class="button-small" th:href="@{/remote-consoles/{id}/edit(id=${console.id()})}">Edit</a>
					</td>
				</tr>
			</tbody>
		</table>
	</main>

	<script th:src="@{/js/sortable-table.js}"></script>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
