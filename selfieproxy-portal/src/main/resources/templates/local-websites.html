<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Selfie Proxy - Local websites')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='local-websites')}"></header>

	<main class="page">
		<section class="page-header">
			<div>
				<h1>Local websites</h1>
				<p class="page-subtitle">Serve simple home pages from this server you already pay for, saving cloud costs.</p>
			</div>
			<a class="button" th:href="@{/local-websites/new}">Add local website</a>
		</section>

		<p class="muted" th:if="${#lists.isEmpty(websites)}">
			No local websites yet. Add one, then drop its files into <code>data/selfieproxy/sites/&lt;domain&gt;/</code> on the server.
		</p>

		<table class="apps-table" th:if="${not #lists.isEmpty(websites)}">
			<thead>
				<tr>
					<th>Domain</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="website : ${websites}">
					<td>
						<a th:href="'https://' + ${website.domain()}" target="_blank" rel="noopener" th:text="${website.domain()}"></a>
					</td>
					<td>
						<a class="button-small" th:href="@{/local-websites/{domain}/edit(domain=${website.domain()})}">Edit</a>
					</td>
				</tr>
			</tbody>
		</table>
	</main>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
