<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${isNew} ? 'Add local website - Selfie Proxy' : 'Edit local website - Selfie Proxy')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='local-websites')}"></header>

	<main class="page">
		<h1 th:text="${isNew} ? 'Add local website' : 'Edit local website'"></h1>

		<ul class="errors" th:if="${errors != null and not #lists.isEmpty(errors)}">
			<li th:each="e : ${errors}" th:text="${e}"></li>
		</ul>

		<form id="website-form" method="post" enctype="multipart/form-data"
			  th:action="${isNew} ? @{/local-websites} : @{/local-websites/{domain}(domain=${website.domain()})}">

			<div class="field" id="domain-mode-field">
				<label>Domain</label>
				<label><input type="radio" name="ownDomain" value="false" th:checked="${!website.ownDomain()}"> <span th:text="'Subdomain of ' + ${domain}"></span></label>
				<label><input type="radio" name="ownDomain" value="true" th:checked="${website.ownDomain()}"> Other domain</label>
			</div>

			<div class="field-row">
				<div class="field" id="domain-field">
					<label for="domain">Subdomain</label>
					<input type="text" id="domain" name="domain" th:value="${website.domain()}" required
						   th:pattern="${website.ownDomain()} ? '\S*' : '[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?'"
						   th:title="${website.ownDomain()} ? 'Domain cannot contain a space' : 'Only letters, numbers, and hyphens -- cannot start or end with a hyphen'">
				</div>

				<div class="field">
					<label>Fully qualified domain name</label>
					<p id="result" class="result-text"></p>
				</div>
			</div>

			<div class="field" id="website-zip-field">
				<label for="websiteZip">Upload website (ZIP)</label>
				<input type="file" id="websiteZip" name="websiteZip" accept=".zip,application/zip">
				<p class="warning-strong" th:unless="${isNew}">Warning: uploading a ZIP file replaces this website's existing contents entirely.</p>
			</div>

			<div class="button-panel">
				<button type="submit" class="button">OK</button>
				<button type="button" id="remove-button" class="button button-danger" th:unless="${isNew}">Remove</button>
				<a class="button button-cancel" th:href="@{/local-websites}">Cancel</a>
			</div>
		</form>

		<form id="delete-form" method="post" th:unless="${isNew}"
			  th:action="@{/local-websites/{domain}/delete(domain=${website.domain()})}">
		</form>
	</main>

	<div id="confirm-overlay" class="overlay">
		<div class="overlay-card">
			<p>Remove this local website? This takes it off the internet and permanently deletes its files from the server. This cannot be undone.</p>
			<button type="button" id="confirm-remove" class="button button-danger">Remove</button>
			<button type="button" id="cancel-remove" class="button button-cancel">Cancel</button>
		</div>
	</div>

	<script th:inline="javascript">
		window.selfieProxy = {
			domain: /*[[${domain}]]*/ 'example.com'
		};
	</script>
	<script th:src="@{/js/local-websites.js}"></script>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
