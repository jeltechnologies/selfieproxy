<!DOCTYPE html>
<html th:attr="data-theme=${theme}" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${isNew} ? 'Add local website - Selfie Proxy' : 'Edit local website - Selfie Proxy')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='local-websites')}"></header>

	<main class="page">
		<h1 th:text="${isNew} ? 'Add local website' : 'Edit local website'"></h1>

		<ul class="errors" th:if="${errors != null and not #lists.isEmpty(errors)}">
			<li th:each="e : ${errors}" th:text="${e}"></li>
		</ul>

		<form id="website-form" method="post" enctype="multipart/form-data"
			  th:action="${isNew} ? @{/local-websites} : @{/local-websites/{fqdn}(fqdn=${website.fqdn()})}">

			<div class="field" id="type-field">
				<label for="type">Type</label>
				<select id="type" name="type">
					<option value="CONTENT" th:selected="${!website.isRedirect()}">Serve website files</option>
					<option value="REDIRECT" th:selected="${website.isRedirect()}">Redirect to another address</option>
				</select>
			</div>

			<div class="field-row">
				<div class="field" id="label-field">
					<label for="label">Subdomain</label>
					<input type="text" id="label" name="label" th:value="${website.label()}"
						   pattern="[A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?"
						   title="Only letters, numbers, and hyphens -- cannot start or end with a hyphen"
						   placeholder="(leave blank to use the domain by itself)">
				</div>

				<div class="field" id="domain-select-field">
					<label for="domainSelect">Of domain</label>
					<select id="domainSelect" name="domain">
						<option th:each="d : ${domains}" th:value="${d.name()}"
								th:text="${d.primary()} ? ${d.name()} + ' (primary)' : ${d.name()}"
								th:selected="${d.name() == website.domain()}"></option>
					</select>
				</div>

				<div class="field">
					<label>Fully qualified domain name</label>
					<p id="result" class="result-text"></p>
				</div>
			</div>

			<div class="field" id="redirect-to-field" style="display:none">
				<label for="redirectTo">Redirect to</label>
				<input type="url" id="redirectTo" name="redirectTo" th:value="${website.redirectTo()}"
					   placeholder="https://www.example.com"
					   title="An address like https://www.example.com, with no path, query, or fragment">
			</div>

			<div class="field" id="website-zip-field">
				<label for="websiteZip">Upload website (ZIP)</label>
				<input type="file" id="websiteZip" name="websiteZip" accept=".zip,application/zip">
				<p class="warning-strong" th:unless="${isNew}">Warning: uploading a ZIP file replaces this website's existing contents entirely.</p>
			</div>

			<div class="button-panel">
				<button type="submit" class="button">OK</button>
				<button type="button" id="remove-button" class="button button-danger" th:unless="${isNew}">Remove</button>
				<a class="button button-cancel" th:href="@{/local-websites}">Cancel</a>
			</div>
		</form>

		<form id="delete-form" method="post" th:unless="${isNew}"
			  th:action="@{/local-websites/{fqdn}/delete(fqdn=${website.fqdn()})}">
		</form>
	</main>

	<div id="confirm-overlay" class="overlay">
		<div class="overlay-card">
			<p>Remove this local website? This takes it off the internet and permanently deletes its files from the server. This cannot be undone.</p>
			<button type="button" id="confirm-remove" class="button button-danger">Remove</button>
			<button type="button" id="cancel-remove" class="button button-cancel">Cancel</button>
		</div>
	</div>

	<script th:src="@{/js/local-websites.js}"></script>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
