<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Enter credential to connect - Selfie Proxy')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='apps')}"></header>

	<main class="page">
		<h1 th:text="'Enter credential to connect: ' + ${app.name()}"></h1>

		<p class="page-subtitle">
			No password is stored for this console yet -- enter it once to connect. It's then kept
			encrypted on this server, so you won't be asked again on future connects.
		</p>

		<form method="post" th:action="@{/apps/{fqdn}/connect(fqdn=${app.fqdn()})}">
			<div class="field" th:if="${app.username() != null}">
				<label>Username</label>
				<p class="result-text" th:text="${app.username()}"></p>
			</div>

			<div class="field">
				<label for="secret">Password</label>
				<input type="password" id="secret" name="secret">
			</div>

			<div class="button-panel">
				<button type="submit" class="button">Connect</button>
				<a class="button button-cancel" th:href="@{/apps}">Cancel</a>
			</div>
		</form>
	</main>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
