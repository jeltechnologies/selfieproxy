<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Selfie Proxy - Homelabs')}"></head>
<body>
	<header th:replace="~{fragments/layout :: topbar(active='homelabs')}"></header>

	<main class="page">
		<section class="page-header">
			<div>
				<h1>Homelabs</h1>
				<p class="page-subtitle">Connect your homelabs to selfieproxy, to expose applications.</p>
			</div>
			<a class="button" th:href="@{/agents/new}">Add homelab</a>
		</section>

		<p class="muted" th:if="${#lists.isEmpty(agents)}">
			No homelabs yet. Add one, then copy its name and secret into that homelab's .env.
		</p>

		<table class="apps-table" th:if="${not #lists.isEmpty(agents)}">
			<thead>
				<tr>
					<th>Name</th>
					<th>Status</th>
					<th>Applications</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="agent : ${agents}" th:attr="data-agent-name=${agent.name()}">
					<td th:text="${agent.name()}"></td>
					<td>
						<span class="status">
							<span class="status-dot" th:classappend="${agent.online()} ? 'status-dot-online' : 'status-dot-offline'"></span>
							<span class="status-text" th:text="${agent.online()} ? 'Connected' : 'Disconnected'"></span>
						</span>
					</td>
					<td class="app-count" th:text="${agent.appCount()}"></td>
					<td>
						<a class="button-small" th:href="@{/agents/{name}/edit(name=${agent.name()})}">Edit</a>
					</td>
				</tr>
			</tbody>
		</table>
	</main>

	<script th:src="@{/js/agents.js}"></script>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
